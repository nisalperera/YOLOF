_BASE_: "yolof_R_50_DC5_1x.yaml"

MODEL:
  BACKBONE:
    FREEZE_AT: 0  # fine-tune all backbone stages

SOLVER:
  OPTIMIZER: "SGD"
  BASE_LR: 0.01
  WEIGHT_DECAY: 0.0001
  MOMENTUM: 0.9
  IMS_PER_BATCH: 8          # local default (overridden on cloud)
  MAX_ITER: 8           # ~8 epochs if 1x ~90000, adjust to your schedule
  WARMUP_ITERS: 1
  STEPS: [0.66, 0.88]     # ≈ epochs 5 and 7 in an 8-epoch run
  GAMMA: 0.1

INPUT:
  MIN_SIZE_TRAIN: (800,)
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333

TEST:
  EVAL_PERIOD: 1

DATALOADER:
  NUM_WORKERS: 4