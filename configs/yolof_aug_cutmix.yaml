_BASE_: "yolof_R_50_DC5_1x.yaml"

SOLVER:
  BASE_LR: 0.004
  WEIGHT_DECAY: 0.0001
  MAX_ITER: 12  # epochs
  WARMUP_ITERS: 1
  STEPS: (0.66, 0.88)
  GAMMA: 0.1
  CHECKPOINT_PERIOD: 1

INPUT:
  AUG_GROUP: "cutmix"
  MIN_SIZE_TRAIN: (480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800)
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333

  COLOR_JITTER:
    ENABLED: True
    BRIGHTNESS: 0.15
    CONTRAST: 0.15
    SATURATION: 0.15
    HUE: 0.0

  CUTMIX:
    ENABLED: True
    ALPHA: 0.7
    PROB: 0.5
    POOL_CAPACITY: 1000
    MIN_BOX_AREA: 16

  SHIFT:
    ENABLED: False

DATALOADER:
  NUM_WORKERS: 4

SEED: 42

OUTPUT_DIR: "output/aug_cutmix"
