INPUT:
  AUG_GROUP: "minimal"
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333

  MINIMAL:
    MIN_SIZE_TRAIN: (640, 672, 704, 736, 768, 800)
    MAX_SIZE_TRAIN: 1333
