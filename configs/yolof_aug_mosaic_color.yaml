_BASE_: "yolof_R_50_DC5_1x.yaml"

SOLVER:
  BASE_LR: 0.004
  WEIGHT_DECAY: 0.0001
  MAX_ITER: 12  # epochs
  WARMUP_ITERS: 1
  STEPS: (0.66, 0.88)
  GAMMA: 0.1
  CHECKPOINT_PERIOD: 1

INPUT:
  AUG_GROUP: "mosaic_color"

  # YOLO augmentation path (required for Mosaic)
  RESIZE:
    ENABLED: True
    SHAPE: (640, 640)
    SCALE_JITTER: (0.8, 1.2)
    TEST_SHAPE: (608, 608)

  JITTER_CROP:
    ENABLED: True
    JITTER_RATIO: 0.3

  DISTORTION:
    ENABLED: True
    HUE: 0.1
    SATURATION: 1.3
    EXPOSURE: 1.3

  MOSAIC:
    ENABLED: True
    POOL_CAPACITY: 1000
    NUM_IMAGES: 4
    MIN_OFFSET: 0.2
    MOSAIC_WIDTH: 640
    MOSAIC_HEIGHT: 640

  SHIFT:
    ENABLED: True
    SHIFT_PIXELS: 32

DATALOADER:
  NUM_WORKERS: 4

SEED: 42

OUTPUT_DIR: "output/aug_mosaic_color"
